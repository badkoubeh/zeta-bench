# PPO hyperparameter search via the Optuna sweeper (TPE/Bayesian + pruning).
#
# Usage (must be a multirun, hence -m):
#   python experiments/train.py -m --config-name=hpo_ppo compute=kaggle_gpu   # full, on cluster
#   python experiments/train.py -m --config-name=hpo_ppo budget=laptop        # coarse, on a Mac
#   # quick offline smoke:
#   python experiments/train.py -m --config-name=hpo_ppo compute=cpu \
#     total_steps=3000 eval_callback.every_n_steps=1000 hydra.sweeper.n_trials=2
#
# Budget comes from the `budget` group (full default). See configs/hpo_sac.yaml
# for how the objective + trial-unique naming work.

defaults:
  - train
  - budget: full
  - override agent: ppo          # this sweep is PPO-specific
  - override hydra/sweeper: optuna
  - _self_

run_name: ${agent.name}_${env.dynamics.fidelity}_${train_mode}_${seed}_t${hydra:job.num}

hydra:
  sweeper:
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: ${seed}
    direction: maximize
    study_name: zetabench_ppo_hpo
    n_jobs: 1                     # n_trials comes from the budget group
    params:
      agent.learning_rate: tag(log, interval(1.0e-5, 1.0e-3))
      agent.gamma: interval(0.95, 0.999)
      agent.gae_lambda: interval(0.9, 0.99)
      agent.clip_range: interval(0.1, 0.3)
      agent.ent_coef: interval(0.0, 0.02)
      agent.n_epochs: range(5, 20)
      # PPOAgent reads n_steps + batch_size from the COMPUTE profile, not agent.*
      compute.n_steps: choice(1024, 2048, 4096)
      compute.batch_size: choice(64, 128, 256)
