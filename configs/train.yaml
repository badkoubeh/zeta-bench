# Top-level training composition. Override any field at the CLI:
#   python experiments/train.py seed=42 agent=ppo dynamics.fidelity=high

defaults:
  - env
  - reward
  - adversary
  - eval
  - agent: sac
  - compute: cpu
  - pid_controller
  - _self_

seed: 42
train_mode: nominal   # nominal | adversarial
total_steps: 2_000_000
run_name: ${agent.name}_${env.dynamics.fidelity}_${train_mode}_${seed}

wandb:
  project: zeta-bench
  mode: ${zeta.wandb_mode:}  # WANDB_MODE if set, else online when WANDB_API_KEY exists, else offline
  tags: []

checkpoint:
  every_n_steps: 50_000
  keep_last: 3

eval_callback:
  every_n_steps: 50_000   # env steps between eval-based model-selection checks
  n_eval_episodes: 20     # episodes per eval
  # Curriculum progress for the model-selection eval env. best_model.zip is chosen
  # by performance at this difficulty. 0.0 = pure-vertical regime (30 m drop, 5 m/s
  # descent, no lateral) — matches the PID baseline's pure-vertical test. 1.0 = full
  # envelope. Pinned low here so selection rewards landing rather than the hardest
  # conditions the policy cannot yet solve.
  curriculum_progress: 0.0

resume_from: null   # path to a .zip checkpoint; resumes training from that step count

results_dir: results/${run_name}
