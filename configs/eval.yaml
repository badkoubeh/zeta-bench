# Robustness evaluation matrix.

eval:
  seeds: 5
  episodes_per_seed: 20              # 5 × 20 = 100 episodes per disturbance cell

  disturbance_grid:
    wind:
      magnitudes_mps: [0.0, 2.0, 5.0, 10.0]
      directions_deg: [0, 90, 180, 270, 45]   # N, E, S, W, NE
    mass_offset_fraction: [-0.20, -0.10, 0.0, 0.10, 0.20]
    sensor_noise:
      sigma: [0.0, 0.01, 0.05, 0.1]
      spike_probability: [0.0, 0.01, 0.05]
      spike_magnitude: 0.5             # scaled-obs units; size of an outlier spike when one fires
    combined:
      enabled: true                  # max-level all disturbances together

  outputs:
    csv_path: results/robustness_matrix.csv
    heatmap_path: results/robustness_heatmap.png
    video_path: results/side_by_side.mp4
    log_wandb_table: true
