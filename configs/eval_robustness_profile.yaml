# Naive-vs-robust robustness matrix for the progressive-profile checkpoints.
# Entry point: experiments/evaluate_robustness.py --config-name=eval_robustness_profile
#
# Compares, on the identical fixed-seed disturbance grid: the PID baseline,
# each agent's gate-selected Stage A checkpoint (*_naive — curriculum only,
# never trained on disturbances) and its Stage B checkpoint (*_robust —
# fine-tuned under domain randomization). Point the *_naive paths at the
# `selected_checkpoint` recorded in results/profile_progressive_*/gate_report.json
# after the profile run.
#
#   python experiments/evaluate_robustness.py --config-name=eval_robustness_profile

defaults:
  - eval_robustness
  - _self_

run_name: robustness_profile_${env.dynamics.fidelity}_${seed}

eval_robustness:
  controllers:
    # Legacy single-checkpoint entries off; the profile variants replace them.
    sac:
      enabled: false
    ppo:
      enabled: false
    sac_naive:
      enabled: true
      type: sac
      model_path: results/sac_moderate_stageA_42/gate_archive/attempt0/best_model.zip
    sac_robust:
      enabled: true
      type: sac
      model_path: results/sac_moderate_dr_42/best_model.zip
    ppo_naive:
      enabled: true
      type: ppo
      model_path: results/ppo_moderate_stageA_42/gate_archive/attempt0/best_model.zip
    ppo_robust:
      enabled: true
      type: ppo
      model_path: results/ppo_moderate_dr_42/best_model.zip
