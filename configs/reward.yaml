# Reward weights — control-theoretic model:
#   total = potential-based shaping + impact-aware terminal + small regularization
#
#   shaping(s, s') = gamma * Phi(s') - Phi(s),   Phi(s) = -landing_cost(s)
#
# Potential-based shaping is policy-invariant (the accumulated shaping telescopes
# to a constant over an episode), so it gives dense per-step gradient WITHOUT the
# per-step penalty that previously made an early crash score better than a long
# controlled descent. See envs/reward.py for the cost/potential definitions.
#
# All numbers are starting values — validate via short training runs + the
# per-component wandb logs, then tune. Nothing here may be hardcoded in code.

reward:
  # Physical normalisation scales. "One normalised unit" of each error is meant
  # to be comparable across terms, so weights read as relative control costs.
  # Anchored to the touchdown success thresholds where one exists.
  scales:
    lateral_m: 25.0                # ~half the OOB cylinder radius (200 m)
    altitude_m: 60.0              # curriculum max initial altitude
    velocity_mps: 10.0            # a few× the 2 m/s touchdown speed threshold
    vertical_velocity_mps: 5.0    # nominal descent speed scale
    tilt_rad: 0.0873              # = touchdown tilt threshold (5°)
    angular_rate_radps: 0.1745    # = touchdown angular-rate threshold (~10°/s)

  # Per-term weights inside landing_cost(state) (the negative of the potential).
  # Higher weight = the agent is pushed harder to drive that normalised error to 0.
  potential:
    lateral_weight: 0.5
    altitude_weight: 0.2
    velocity_weight: 1.0
    vertical_velocity_weight: 1.5
    tilt_weight: 1.0
    angular_rate_weight: 0.5
    clip_abs: 10.0                # clip |Phi| for numerical stability

  # Secondary control regularisers. Kept small so they make an already-good
  # landing efficient/smooth rather than discouraging necessary thrust authority.
  regularization:
    fuel_weight: 0.0005           # per kg fuel burned this step
    smoothness_weight: 0.001      # per ||action - prev_action||^2 (jerk)
    control_weight: 0.0001        # per ||action||^2 (effort)

  # Impact-aware terminal outcome. Ordering enforced:
  #   safe landing > slow upright crash > fast tilted crash > out-of-bounds.
  terminal:
    success_bonus: 500.0
    crash_base_penalty: 100.0           # flat floor for any crash
    touchdown_speed_weight: 120.0       # × normalised touchdown speed^2
    touchdown_tilt_weight: 80.0         # × normalised touchdown tilt^2
    touchdown_angular_rate_weight: 40.0 # × normalised touchdown angular rate^2
    touchdown_lateral_weight: 20.0      # × normalised lateral error^2
    out_of_bounds_penalty: 300.0
    timeout_base_penalty: 50.0
    timeout_state_weight: 50.0          # × landing_cost(final state)
    terminal_clip_abs: 1000.0           # clip |terminal| for SAC stability
