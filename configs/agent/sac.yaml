# @package _global_
# Stable-Baselines3 SAC hyperparameters.
# TODO: tune via wandb sweep before final results.

agent:
  name: sac
  algorithm: SAC

  learning_rate: 3.0e-4
  buffer_size: 1_000_000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  train_freq: 1
  gradient_steps: 1
  learning_starts: 10_000
  ent_coef: auto
  target_entropy: auto

  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256]
