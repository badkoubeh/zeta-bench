# @package _global_
# Stable-Baselines3 PPO hyperparameters.
# TODO: tune via wandb sweep before final results.

agent:
  name: ppo
  algorithm: PPO

  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.999
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5

  policy: MlpPolicy
  policy_kwargs:
    net_arch: [256, 256]
