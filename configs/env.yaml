# Environment + dynamics parameters.
# Frames: NED inertial (X=North, Y=East, Z=Down), FRD body. Gravity is +Z.
# All units SI.

env:
  dynamics:
    fidelity: moderate  # moderate | high

    # Vehicle parameters — grounded in publicly documented Falcon-9 /
    # Merlin-1D values. See docs/parameter_sources.md for citations per
    # parameter.
    dry_mass_kg: 25_000.0          # Falcon-9 first-stage dry mass (≈25 t)
    initial_fuel_kg: 5_000.0       # landing-burn propellant reserve only
    max_thrust_N: 845_000.0        # Merlin-1D sea-level thrust
    isp_s: 282.0                   # Merlin-1D sea-level specific impulse
    drag_coefficient: 0.75         # scalar Cd, subsonic terminal descent
    reference_area_m2: 10.5        # π·r² with r ≈ 1.83 m

    # Body-frame principal-axes inertia tensor (kg·m²).
    inertia_xx: 2.5e6              # pitch (= yaw by cylindrical symmetry)
    inertia_yy: 2.5e6              # yaw
    inertia_zz: 1.2e5              # roll (much smaller — slender body)

    # CoM-to-engine-gimbal-pivot distance, used in compute_gimbal_torque_body.
    engine_lever_arm_m: 15.0       # ~CoM at 1/3 up a 47 m stage

    # Actuator limits.
    gimbal_max_rad: 0.0873         # ±5° gimbal range (conservative for Merlin-1D)
    # Must sit BELOW hover throttle (~0.29-0.35 = weight/max_thrust as fuel burns)
    # so the engine can hover / brake gently. At 0.4 the min active thrust always
    # accelerates the vehicle upward (no hover possible), making a soft landing a
    # near-measure-zero event — agents drift up into the ceiling (100% OOB). 0.25
    # gives min active thrust 211 kN (net -2.77 m/s², still descends engine-on)
    # while keeping hover reachable.
    throttle_min: 0.25             # deep-throttle floor (below hover; enables soft landing)
    throttle_max: 1.0              # full thrust

  episode:
    control_hz: 50           # agent decision frequency
    physics_substeps: 4      # 4 RK4 substeps per control tick => 200 Hz physics
    max_steps: 2500          # 50 s wall-clock @ 50 Hz — covers altitude_max at target_descent (60 m / 2 m/s = 30 s, 20 s margin)

  init_conditions:
    # Ranges curriculum-lerped from min to max as difficulty rises.
    # Altitude capped at 60 m for the altitude-only PID baseline (no outer
    # altitude loop): at target_descent=2 m/s the rocket covers 60 m in 30 s,
    # which fits the 50 s episode budget. Raise once the cascade outer loop lands.
    altitude_min_m: 30.0
    altitude_max_m: 60.0
    lateral_offset_max_m: 50.0
    descent_velocity_min_mps: 5.0
    descent_velocity_max_mps: 20.0
    attitude_tilt_max_rad: 0.0   # start near-vertical; raise via curriculum later

  oob:
    cylinder_radius_m: 200.0
    ceiling_m: 100.0   # low ceiling removes the fly-up escape from a 30 m start so the agent must engage the pad

  touchdown:
    velocity_threshold_mps: 3.0          # loosened from 2.0 to widen the soft-landing window for early learning
    tilt_threshold_rad: 0.0873           # 5°
    angular_rate_threshold_rad_s: 0.1745 # ~10°/s

  curriculum:
    anneal_steps: 1_000_000
    schedule: linear   # linear committed; sigmoid/step/adaptive reserved
    progress_override: null   # null = follow the annealing schedule; set in [0,1] to pin
                              # difficulty (eval / model-selection envs pin this to 1.0)

  obs_scaler:
    # Hand-rolled fixed-bound normalisation (utils/normalisation.py).
    position_xy_m: 200.0
    position_z_m: 600.0
    velocity_mps: 50.0
    attitude_rad: 3.14159
    angular_rate_rad_s: 6.28318
    fuel_mass_kg: 5_000.0
