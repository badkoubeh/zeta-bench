# @package _global_
# Compute profile: CPU-only execution.
# Use for development, CI, integration tests, and reviewer reproduction
# on machines without a GPU.

compute:
  profile: cpu
  device: cpu
  n_envs: 4              # SubprocVecEnv parallel workers
  batch_size: 64         # SAC/PPO minibatch
  buffer_size: 100_000   # SAC replay buffer (samples)
  n_steps: 1024          # PPO rollout length per env
  data_parallel: false   # not applicable on CPU
